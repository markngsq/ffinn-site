<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FFINN — Coming Soon</title>
  <meta name="description" content="FFINN — DJ, selector, and workshop tutor based in Bristol, UK. Website coming soon." />
  <meta name="keywords" content="ffinn, bristol dj, dj workshops, dj lessons, pirate studios, lets move dancefloors together" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'Forma DJR Text';
      src: url('fonts/FormaDJRText-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Forma DJR Text';
      src: url('fonts/FormaDJRText-Bold.woff2') format('woff2');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: #E1BD37; color: #000; }

    :root {
      --bg: #060D07;
      --accent: #E1BD37;
      --text-muted: #8CB88E;
      --font-sans: 'Forma DJR Text', system-ui, sans-serif;
      --font-mono: 'Geist Mono', 'Courier New', monospace;
    }

    body {
      background: linear-gradient(160deg, #020904 0%, #060D07 45%, #030A05 100%);
      color: #fff;
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    /* Static noise grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: #111;
      filter: url(#noiseFilter);
      opacity: 0.13;
      pointer-events: none;
      z-index: 9000;
    }

    .logo {
      width: min(280px, 60vw);
      height: auto;
      margin-bottom: 2.5rem;
    }

    .tagline {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2rem;
    }

    .coming-soon {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 300;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 2.5rem;
      letter-spacing: -0.01em;
    }

    .links {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .links a {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.12s ease;
    }

    .links a:hover { color: var(--accent); }

    .btn-workshops {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.9rem 2.2rem;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #000;
      text-decoration: none;
      margin-bottom: 2.5rem;
      transition: opacity 0.15s ease;
    }

    .btn-workshops:hover { opacity: 0.85; }

    .sep {
      color: rgba(255, 255, 255, 0.15);
    }
  </style>
</head>
<body>

  <img src="logo.png" alt="FFINN" class="logo" />
  <p class="tagline">Let's move dancefloors together</p>
  <p class="coming-soon">Coming soon</p>
  <a href="/letsmove" class="btn-workshops">DJ Workshops</a>
  <div class="links">
    <a href="https://www.instagram.com/ffinniff/" target="_blank" rel="noopener">Instagram</a>
    <span class="sep">·</span>
    <a href="https://www.mixcloud.com/ffinn/" target="_blank" rel="noopener">Mixcloud</a>
    <span class="sep">·</span>
    <a href="https://soundcloud.com/ffinniff" target="_blank" rel="noopener">SoundCloud</a>
    <span class="sep">·</span>
    <a href="mailto:ffinniff@gmail.com">Contact</a>
  </div>

  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="noiseFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
    </filter>
  </svg>
</body>
</html>
