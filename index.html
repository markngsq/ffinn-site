<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#060D07" />
  <title>FFINN — Sonic Storyteller, DJ Tutor</title>
  <meta name="description" content="FFINN is a queer, Bristol-based multi-genre DJ and tutor, with notable appearances at Shambala Festival and Bang Face Weekender under their belt." />
  <meta name="keywords" content="bristol, singapore, dj, ffinn, underground, dance, alternative, booty bass, dubstep, dnb, 140, femme, girl, lgbtqia, esea, asian" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;500;600&family=Major+Mono+Display&family=Victor+Mono:wght@100;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: #E1BD37; color: #000; }

    :root {
      --bg: #060D07;
      --accent: #E1BD37;
      --text-muted: #A8D4AA;
      --font-body: 'Victor Mono', monospace;
      --font-heading: 'Major Mono Display', monospace;
      --font-mono: 'Doto', monospace;
    }

    body {
      background: linear-gradient(160deg, #020904 0%, #060D07 45%, #030A05 100%);
      color: #fff;
      font-family: var(--font-body);
      font-weight: 100;
      -webkit-font-smoothing: antialiased;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    /* Static noise grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: #111;
      filter: url(#noiseFilter);
      opacity: 0.13;
      pointer-events: none;
      z-index: 9000;
    }

    .site-title {
      font-family: var(--font-heading);
      font-size: clamp(3.5rem, 12vw, 8rem);
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .subtitle {
      font-family: var(--font-mono);
      font-size: 0.83rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
    }

    .btn-workshops {
      display: inline-block;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.9rem 2.2rem;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #000;
      text-decoration: none;
      margin-bottom: 2.5rem;
      transition: opacity 0.15s ease;
    }

    .btn-workshops:hover { opacity: 0.85; }

    .links {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .links a {
      font-family: var(--font-mono);
      font-size: 0.77rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.12s ease;
    }

    .links a:hover { color: var(--accent); }

    .links .icon { display: none; }

    .sep {
      color: rgba(255, 255, 255, 0.15);
    }

    @media (max-width: 600px) {
      .links { gap: 1.5rem; }
      .links .icon { display: block; width: 22px; height: 22px; }
      .links .label { display: none; }
      .links .sep { display: none; }
      .links a { font-size: 0; color: var(--text-muted); }
    }
  </style>
</head>
<body>

  <h1 class="site-title">fFInN</h1>
  <p class="subtitle">Sonic Storyteller & DJ Tutor</p>
  <a href="/letsmove" class="btn-workshops">Let's Move Dancefloors Together</a>
  <div class="links">
    <a href="https://www.instagram.com/ffinniff/" target="_blank" rel="noopener" aria-label="Instagram">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      <span class="label">Instagram</span>
    </a>
    <span class="sep">·</span>
    <a href="https://www.mixcloud.com/ffinn/" target="_blank" rel="noopener" aria-label="Mixcloud">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
      <span class="label">Mixcloud</span>
    </a>
    <span class="sep">·</span>
    <a href="https://soundcloud.com/ffinniff" target="_blank" rel="noopener" aria-label="SoundCloud">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/><path d="M9 20V9"/></svg>
      <span class="label">SoundCloud</span>
    </a>
    <span class="sep">·</span>
    <a href="mailto:ffinniff@gmail.com" aria-label="Contact">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      <span class="label">Contact</span>
    </a>
  </div>

  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="noiseFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
    </filter>
  </svg>
</body>
</html>
